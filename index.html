<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Loft — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d14;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .wrap { max-width: 480px; width: 100%; text-align: center; }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .tagline { font-size: 16px; color: #888; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 16px; }
    a.card {
      display: block;
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    a.card:hover { border-color: #a78bfa; background: #1e1a2e; }
    .card-title { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .card-desc { font-size: 14px; color: #888; }
    .footer { margin-top: 48px; font-size: 13px; color: #555; }
    a.mail { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🌙</div>
    <h1>Dream Loft</h1>
    <p class="tagline">Your personal dream journal</p>

    <div class="links">
      <a class="card" href="privacy.html">
        <div class="card-title">Privacy Policy</div>
        <div class="card-desc">How we handle your data</div>
      </a>
      <a class="card" href="terms.html">
        <div class="card-title">Terms of Service</div>
        <div class="card-desc">Subscription terms and usage rules</div>
      </a>
    </div>

    <p class="footer">
      Questions? <a class="mail" href="mailto:kasper.chen@stranity.com">kasper.chen@stranity.com</a>
    </p>
  </div>
</body>
</html>
